<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <h1>My Tasks</h1>
            <div id="username"></div>
        </div>
        <div class="header-actions">
            <button class="btn-icon" onclick="toggleDarkMode()" id="themeBtn">☀️ Light</button>
            <button class="btn-icon" onclick="logout()">↩ Logout</button>
        </div>
    </div>

    <!-- Add Task Card -->
    <div class="input-card">
        <div class="input-row">
            <input type="text" id="taskInput" placeholder="What needs to be done?" onkeydown="if(event.key==='Enter') addTask()">
        </div>
        <div class="input-row">
            <input type="date" id="dueDate" style="flex:1">
            <select id="priority" style="flex:1">
                <option value="Low">🟢 Low</option>
                <option value="Medium" selected>🟡 Medium</option>
                <option value="High">🔴 High</option>
            </select>
            <button class="btn-primary" onclick="addTask()">+ Add</button>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="filter-row">
            <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
            <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
            <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
            <button class="filter-btn" onclick="setFilter('high', this)">🔴 High</button>
        </div>
        <div class="sort-search-row">
            <button class="sort-btn" id="sortDate" onclick="setSort('date', this)">📅 Date</button>
            <button class="sort-btn" id="sortPriority" onclick="setSort('priority', this)">⬆ Priority</button>
            <input type="text" id="searchInput" placeholder="🔍 Search tasks..." oninput="displayTasks()">
        </div>
    </div>

    <!-- Loader -->
    <div id="loader">Loading your tasks...</div>

    <!-- Task List -->
    <ul id="taskList"></ul>

</div>
<script src="script.js"></script>
</body>
</html>
