<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>To-Do App</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>To-Do App</h1>
            <h2 id="username"></h2>
            <button onclick="toggleDarkMode()" class="dark-toggle">🌙 Dark Mode</button>
            <button onclick="logout()" class="logout-btn">Logout</button>
            <div class="input-section">
                <input type="text" id="taskInput" placeholder="Enter a new task">

                <input type="date" id="dueDate">
                <select id="priority">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>

                <button onclick="addTask()">Add</button>
            </div>
            <div class="filters">
                 <button onclick="setFilter('all')">All</button>
                 <button onclick="setFilter('pending')">Pending</button>
                 <button onclick="setFilter('completed')">Completed</button>
                 <button onclick="setFilter('high')">High Priority</button>
             </div>
             <div class="sorting">
                 <button onclick="setSort('date')">Sort by Date</button>
                  <button onclick="setSort('priority')">Sort by Priority</button>
             </div>
            <div class="search-section">
                 <input type="text" id="searchInput" placeholder="Search tasks..." onkeyup="displayTasks()">
             </div> 
             <div id="loader" style="display:none;">Loading...</div>
             
            <ul id="taskList"></ul>
        </div>

        <script src="script.js"></script>
    </body>
</html>
